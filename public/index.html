<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 URL Shortener</h1>
            <p>Create short, memorable links</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalLinks">0</div>
                <div class="stat-label">Total Links</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
        </div>

        <div class="shorten-form">
            <h2>Shorten a URL</h2>
            <div class="form-group">
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="Enter your long URL (e.g., https://example.com/very/long/url)"
                    autocomplete="off"
                />
                <input 
                    type="text" 
                    id="customAlias" 
                    placeholder="Custom alias (optional)"
                    autocomplete="off"
                />
                <button id="shortenBtn">Shorten URL</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="resultContainer" class="result-container" style="display: none;">
                <div class="result-content">
                    <label>Your shortened URL:</label>
                    <div class="short-url-display">
                        <a id="shortUrl" href="" target="_blank"></a>
                        <button id="copyBtn" class="copy-btn" title="Copy to clipboard">📋 Copy</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="links-section">
            <h2>All Shortened Links</h2>
            <div class="table-container">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short URL</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <!-- Links will be inserted here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    No links created yet. Start by shortening a URL above!
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
