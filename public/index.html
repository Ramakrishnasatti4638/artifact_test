<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3348;
      --accent:    #6c63ff;
      --accent-h:  #5a52e0;
      --accent2:   #00d4aa;
      --text:      #e4e6f0;
      --muted:     #8890b0;
      --danger:    #ff5f6d;
      --danger-h:  #e04a57;
      --success:   #00d4aa;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    header .logo span { color: var(--accent); }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── Layout ── */
    .container { max-width: 860px; margin: 0 auto; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: var(--shadow);
    }

    /* ── Shorten form ── */
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .form-row input {
      flex: 1 1 260px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .form-row input:focus { border-color: var(--accent); }
    .form-row input::placeholder { color: var(--muted); }

    .alias-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .alias-row label { color: var(--muted); font-size: .875rem; white-space: nowrap; }
    .alias-row input {
      flex: 0 1 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .875rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s;
    }
    .alias-row input:focus { border-color: var(--accent); }
    .alias-row input::placeholder { color: var(--muted); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      padding: 11px 22px;
      transition: background .18s, transform .1s;
    }
    button:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-icon {
      background: var(--surface2);
      color: var(--muted);
      padding: 7px 10px;
      font-size: .8rem;
      border: 1px solid var(--border);
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 5px 10px;
      font-size: .82rem;
      border-radius: 6px;
    }
    .btn-danger:hover { background: rgba(255,95,109,.1); border-color: var(--danger); }

    /* ── Result box ── */
    #result-box {
      margin-top: 18px;
      display: none;
    }
    .result-inner {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .result-inner a {
      flex: 1;
      color: var(--accent2);
      font-weight: 600;
      font-size: .95rem;
      text-decoration: none;
      word-break: break-all;
    }
    .result-inner a:hover { text-decoration: underline; }
    #copy-btn { flex-shrink: 0; }

    /* ── Error ── */
    #error-msg {
      margin-top: 12px;
      color: var(--danger);
      font-size: .875rem;
      display: none;
    }

    /* ── Stats cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 28px 0;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-card .stat-value {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card .stat-label {
      margin-top: 6px;
      font-size: .85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* ── Table ── */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    thead th {
      background: var(--surface2);
      padding: 11px 14px;
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-size: .78rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td {
      padding: 11px 14px;
      vertical-align: middle;
      color: var(--text);
    }
    .td-original {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .td-short a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
    }
    .td-short a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      background: rgba(108,99,255,.18);
      color: var(--accent);
      border-radius: 99px;
      padding: 2px 10px;
      font-size: .8rem;
      font-weight: 700;
    }
    .empty-row td {
      text-align: center;
      padding: 32px;
      color: var(--muted);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      box-shadow: var(--shadow);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 520px) {
      .card { padding: 20px 16px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">&#x26A1;<span>Snip</span>URL</div>
      <p>Shorten, share, and track your links instantly</p>
    </header>

    <!-- Shorten card -->
    <div class="card" style="margin-bottom: 28px;">
      <div class="form-row">
        <input id="url-input" type="url" placeholder="Paste a long URL here…" autocomplete="off" />
        <button class="btn-primary" id="shorten-btn">Shorten &#x2192;</button>
      </div>
      <div class="alias-row">
        <label for="alias-input">Custom alias (optional):</label>
        <input id="alias-input" type="text" placeholder="my-link" maxlength="40" autocomplete="off" />
      </div>
      <div id="error-msg"></div>
      <div id="result-box">
        <div class="result-inner">
          <a id="result-link" href="#" target="_blank"></a>
          <button class="btn-icon" id="copy-btn" title="Copy to clipboard">&#x2398; Copy</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-links">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-clicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="section-title">&#x1F517; Your Links</div>
      <div class="table-wrap">
        <table id="links-table">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="links-body">
            <tr class="empty-row"><td colspan="5">No links yet — shorten your first URL above!</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const BASE = window.location.origin;

    const urlInput    = document.getElementById('url-input');
    const aliasInput  = document.getElementById('alias-input');
    const shortenBtn  = document.getElementById('shorten-btn');
    const errorMsg    = document.getElementById('error-msg');
    const resultBox   = document.getElementById('result-box');
    const resultLink  = document.getElementById('result-link');
    const copyBtn     = document.getElementById('copy-btn');
    const linksBody   = document.getElementById('links-body');
    const statLinks   = document.getElementById('stat-links');
    const statClicks  = document.getElementById('stat-clicks');
    const toast       = document.getElementById('toast');

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      resultBox.style.display = 'none';
    }

    function clearError() {
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function truncate(str, n = 45) {
      return str.length > n ? str.slice(0, n) + '…' : str;
    }

    async function loadLinks() {
      const res  = await fetch('/api/links');
      const data = await res.json();

      let totalClicks = 0;
      data.forEach(l => { totalClicks += l.clickCount; });
      statLinks.textContent  = data.length;
      statClicks.textContent = totalClicks;

      if (data.length === 0) {
        linksBody.innerHTML = '<tr class="empty-row"><td colspan="5">No links yet — shorten your first URL above!</td></tr>';
        return;
      }

      linksBody.innerHTML = data.map(link => {
        const shortUrl = `${BASE}/${link.shortCode}`;
        return `
          <tr>
            <td class="td-original" title="${escHtml(link.originalUrl)}">${escHtml(truncate(link.originalUrl))}</td>
            <td class="td-short"><a href="${escHtml(shortUrl)}" target="_blank">${escHtml(link.shortCode)}</a></td>
            <td><span class="badge">${link.clickCount}</span></td>
            <td>${formatDate(link.createdAt)}</td>
            <td><button class="btn-danger" data-code="${escHtml(link.shortCode)}">Delete</button></td>
          </tr>`;
      }).join('');

      linksBody.querySelectorAll('.btn-danger').forEach(btn => {
        btn.addEventListener('click', () => deleteLink(btn.dataset.code));
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function deleteLink(shortCode) {
      const res = await fetch(`/api/links/${encodeURIComponent(shortCode)}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('Link deleted.');
        loadLinks();
      } else {
        showToast('Failed to delete link.');
      }
    }

    shortenBtn.addEventListener('click', shorten);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') shorten(); });

    async function shorten() {
      clearError();
      const url   = urlInput.value.trim();
      const alias = aliasInput.value.trim();

      if (!url) { showError('Please enter a URL.'); return; }

      shortenBtn.disabled = true;
      shortenBtn.textContent = 'Shortening…';

      try {
        const body = { url };
        if (alias) body.customAlias = alias;

        const res  = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Something went wrong.');
          return;
        }

        const shortUrl = `${BASE}/${data.shortCode}`;
        resultLink.href        = shortUrl;
        resultLink.textContent = shortUrl;
        resultBox.style.display = 'block';

        urlInput.value  = '';
        aliasInput.value = '';
        loadLinks();
        showToast('Link shortened!');
      } catch {
        showError('Network error. Please try again.');
      } finally {
        shortenBtn.disabled  = false;
        shortenBtn.textContent = 'Shorten →';
      }
    }

    copyBtn.addEventListener('click', () => {
      const url = resultLink.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => showToast('Copied to clipboard!'));
      } else {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('Copied to clipboard!');
      }
    });

    // Initial load
    loadLinks();
  </script>
</body>
</html>
