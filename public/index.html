<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Shorten your long URLs into easy-to-share links</p>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <div class="card">
      <h2>Create Short Link</h2>
      <form id="shortenForm">
        <div class="form-group">
          <label for="urlInput">Original URL</label>
          <input 
            type="text" 
            id="urlInput" 
            placeholder="https://example.com/very-long-url" 
            required
          >
        </div>
        <div class="form-group">
          <label for="aliasInput">Custom Alias (optional)</label>
          <input 
            type="text" 
            id="aliasInput" 
            placeholder="my-custom-alias"
          >
        </div>
        <button type="submit" class="btn-primary">Shorten URL</button>
      </form>

      <div id="result" class="result-container" style="display: none;">
        <div class="result-header">
          <h3>✓ Short URL Created!</h3>
        </div>
        <div class="result-content">
          <input type="text" id="shortUrlDisplay" readonly>
          <button id="copyBtn" class="btn-copy">Copy</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>All Links</h2>
      <div class="table-container">
        <table id="linksTable">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr>
              <td colspan="5" class="empty-state">No links created yet</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
