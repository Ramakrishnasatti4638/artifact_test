<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Shorten long links and track their clicks.</p>
      </header>

      <section class="card">
        <form id="shorten-form">
          <div class="field">
            <label for="url">Long URL</label>
            <input
              type="url"
              id="url"
              name="url"
              placeholder="https://example.com/very/long/url"
              required
            />
          </div>
          <div class="field">
            <label for="alias">Custom alias (optional)</label>
            <input
              type="text"
              id="alias"
              name="alias"
              placeholder="my-link"
            />
          </div>
          <button type="submit">Shorten</button>
        </form>
        <p id="form-error" class="error" role="alert"></p>
        <div id="result" class="result hidden">
          <span>Short URL:</span>
          <a id="result-link" href="#" target="_blank" rel="noopener"></a>
          <button id="copy-btn" type="button" class="copy-btn">Copy</button>
        </div>
      </section>

      <section class="stats">
        <div class="stat-card">
          <span class="stat-value" id="total-links">0</span>
          <span class="stat-label">Total Links</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="total-clicks">0</span>
          <span class="stat-label">Total Clicks</span>
        </div>
      </section>

      <section class="card">
        <h2>Links</h2>
        <table id="links-table">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="links-body"></tbody>
        </table>
        <p id="empty-state" class="empty">No links yet. Shorten one above!</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
