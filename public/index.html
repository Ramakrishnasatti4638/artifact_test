<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ─── LEFT SIDEBAR ─────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-avatar me">M</div>
        <span class="sidebar-title">Messages</span>
        <button class="icon-btn" title="New chat">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="Search conversations…" />
      </div>

      <ul class="contact-list" id="contactList"></ul>
    </aside>

    <!-- ─── MAIN CHAT AREA ────────────────────────────────── -->
    <main class="chat-main">

      <!-- Header -->
      <header class="chat-header" id="chatHeader">
        <div class="chat-header-info">
          <div class="header-avatar" id="headerAvatar"></div>
          <div>
            <div class="header-name" id="headerName"></div>
            <div class="header-status">
              <span class="online-dot" id="onlineDot"></span>
              <span class="status-text" id="statusText"></span>
            </div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" title="Voice call">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </button>
          <button class="icon-btn" title="Video call">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
          </button>
          <button class="icon-btn" title="Info">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea"></div>

      <!-- Input bar -->
      <div class="input-bar">
        <div class="emoji-wrap">
          <button class="icon-btn emoji-toggle" id="emojiToggle" title="Emoji">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 13s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </button>
          <div class="emoji-picker" id="emojiPicker"></div>
        </div>

        <input
          class="message-input"
          id="messageInput"
          type="text"
          placeholder="Type a message…"
          autocomplete="off"
        />

        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
