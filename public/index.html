<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Shorten your long URLs instantly</p>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <div class="shorten-section">
      <h2>Create Short Link</h2>
      <form id="shortenForm">
        <div class="form-group">
          <label for="urlInput">Enter URL</label>
          <input 
            type="text" 
            id="urlInput" 
            placeholder="https://example.com/very-long-url" 
            required
          >
        </div>
        <div class="form-group">
          <label for="customAlias">Custom Alias (optional)</label>
          <input 
            type="text" 
            id="customAlias" 
            placeholder="my-custom-link"
            pattern="[a-zA-Z0-9]+"
            title="Only letters and numbers allowed"
          >
        </div>
        <button type="submit" class="btn-primary">Shorten URL</button>
      </form>

      <div id="resultContainer" class="result-container" style="display: none;">
        <div class="result-success">
          <p>✅ Short URL created successfully!</p>
          <div class="short-url-display">
            <input type="text" id="shortUrlResult" readonly>
            <button id="copyBtn" class="btn-secondary">Copy</button>
          </div>
        </div>
      </div>

      <div id="errorContainer" class="error-container" style="display: none;">
        <p id="errorMessage"></p>
      </div>
    </div>

    <div class="links-section">
      <h2>All Links</h2>
      <div class="table-container">
        <table id="linksTable">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr>
              <td colspan="5" class="no-data">No links created yet</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
