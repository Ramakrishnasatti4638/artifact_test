<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Shorten your long URLs into easy-to-share links</p>
    </header>

    <!-- Stats Summary -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <!-- URL Shortener Form -->
    <div class="form-container">
      <h2>Create Short Link</h2>
      <form id="shortenForm">
        <div class="form-group">
          <label for="url">Original URL</label>
          <input 
            type="text" 
            id="url" 
            placeholder="https://example.com/very/long/url" 
            required
          >
        </div>
        <div class="form-group">
          <label for="customAlias">Custom Alias (optional)</label>
          <input 
            type="text" 
            id="customAlias" 
            placeholder="my-custom-link"
          >
        </div>
        <button type="submit" class="btn-primary">Shorten URL</button>
      </form>

      <!-- Result Display -->
      <div id="result" class="result-container" style="display: none;">
        <h3>✓ Short URL Created!</h3>
        <div class="short-url-display">
          <input type="text" id="shortUrlInput" readonly>
          <button id="copyBtn" class="btn-copy">Copy</button>
        </div>
        <a id="shortUrlLink" href="#" target="_blank" class="short-url-link"></a>
      </div>

      <!-- Error Display -->
      <div id="error" class="error-container" style="display: none;"></div>
    </div>

    <!-- Links Table -->
    <div class="table-container">
      <h2>All Short Links</h2>
      <table id="linksTable">
        <thead>
          <tr>
            <th>Original URL</th>
            <th>Short URL</th>
            <th>Clicks</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="linksTableBody">
          <tr>
            <td colspan="5" class="empty-state">No links yet. Create your first short link above!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
