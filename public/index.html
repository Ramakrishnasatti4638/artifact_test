<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form Wizard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="wizard-container">
      <h1>Registration Form</h1>
      
      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-step active" data-step="1">
          <div class="step-circle">1</div>
          <div class="step-label">Personal</div>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step" data-step="2">
          <div class="step-circle">2</div>
          <div class="step-label">Preferences</div>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step" data-step="3">
          <div class="step-circle">3</div>
          <div class="step-label">Confirm</div>
        </div>
      </div>

      <!-- Form Steps -->
      <form id="wizardForm">
        <!-- Step 1: Personal Details -->
        <div class="form-step active" data-step="1">
          <h2>Personal Details</h2>
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              placeholder="Enter your full name"
              required
            >
            <span class="error-message" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="Enter your email"
              required
            >
            <span class="error-message" id="emailError"></span>
          </div>
        </div>

        <!-- Step 2: Preferences -->
        <div class="form-step" data-step="2">
          <h2>Choose Your Plan</h2>
          <div class="plan-options">
            <label class="plan-card">
              <input type="radio" name="plan" value="basic" required>
              <div class="plan-content">
                <h3>Basic</h3>
                <div class="plan-price">$9.99/mo</div>
                <ul class="plan-features">
                  <li>✓ 5 Projects</li>
                  <li>✓ 10GB Storage</li>
                  <li>✓ Email Support</li>
                </ul>
              </div>
            </label>
            
            <label class="plan-card featured">
              <div class="featured-badge">Popular</div>
              <input type="radio" name="plan" value="pro" required>
              <div class="plan-content">
                <h3>Pro</h3>
                <div class="plan-price">$19.99/mo</div>
                <ul class="plan-features">
                  <li>✓ Unlimited Projects</li>
                  <li>✓ 100GB Storage</li>
                  <li>✓ Priority Support</li>
                  <li>✓ Advanced Analytics</li>
                </ul>
              </div>
            </label>
            
            <label class="plan-card">
              <input type="radio" name="plan" value="enterprise" required>
              <div class="plan-content">
                <h3>Enterprise</h3>
                <div class="plan-price">$49.99/mo</div>
                <ul class="plan-features">
                  <li>✓ Unlimited Everything</li>
                  <li>✓ 1TB Storage</li>
                  <li>✓ 24/7 Phone Support</li>
                  <li>✓ Custom Integrations</li>
                  <li>✓ Dedicated Manager</li>
                </ul>
              </div>
            </label>
          </div>
          <span class="error-message" id="planError"></span>
        </div>

        <!-- Step 3: Confirmation -->
        <div class="form-step" data-step="3">
          <h2>Confirm Your Information</h2>
          <div class="summary-section">
            <h3>Personal Details</h3>
            <div class="summary-item">
              <span class="summary-label">Name:</span>
              <span class="summary-value" id="summaryName"></span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Email:</span>
              <span class="summary-value" id="summaryEmail"></span>
            </div>
          </div>
          
          <div class="summary-section">
            <h3>Selected Plan</h3>
            <div class="summary-item">
              <span class="summary-label">Plan:</span>
              <span class="summary-value" id="summaryPlan"></span>
            </div>
          </div>
          
          <div class="terms">
            <label class="checkbox-label">
              <input type="checkbox" id="terms" required>
              <span>I agree to the Terms of Service and Privacy Policy</span>
            </label>
            <span class="error-message" id="termsError"></span>
          </div>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
          <div class="success-icon">✓</div>
          <h2>Registration Successful!</h2>
          <p>Thank you for signing up. We've sent a confirmation email to your address.</p>
          <button type="button" class="btn btn-primary" onclick="location.reload()">Start New Registration</button>
        </div>

        <!-- Navigation Buttons -->
        <div class="form-navigation">
          <button type="button" class="btn btn-secondary" id="prevBtn">Back</button>
          <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
          <button type="submit" class="btn btn-success" id="submitBtn">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
