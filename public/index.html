<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login &amp; Register</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2.5rem 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .card-header .logo svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card-header p {
      font-size: 0.9rem;
      color: #6b7280;
      margin-top: 0.3rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.45rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 0.9rem 0.7rem 2.6rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: #667eea;
      text-decoration: none;
      margin-top: 0.35rem;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.75rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover {
      opacity: 0.92;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1.25rem;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .signup-text {
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .signup-text a {
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.75rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-register:hover {
      opacity: 0.92;
    }

    .btn-register:active {
      transform: scale(0.98);
    }

    .login-text {
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .login-text a {
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
    }

    .login-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <!-- Lock icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a4 4 0 0 1 4 4v2H8V6a4 4 0 0 1 4-4zm6 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2zm-6 3a1.5 1.5 0 0 1 .75 2.8V15a.75.75 0 0 1-1.5 0v-1.2A1.5 1.5 0 0 1 12 11z"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <form action="/login" method="POST" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrapper">
          <!-- Envelope icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <!-- Key icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="15" r="4"/>
            <line x1="11.5" y1="11.5" x2="20" y2="3"/>
            <line x1="17" y1="6" x2="19" y2="8"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign in</button>
    </form>

    <div class="divider">or</div>

    <p class="signup-text">
      Don't have an account? <a href="#register">Sign up</a>
    </p>
  </div>

  <!-- ── Registration card ── -->
  <div class="card" id="register">
    <div class="card-header">
      <div class="logo">
        <!-- Person icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="7" r="4"/>
          <path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <h1>Create account</h1>
      <p>Sign up for free today</p>
    </div>

    <form action="/register" method="POST" novalidate>
      <div class="form-group">
        <label for="reg-name">Full name</label>
        <div class="input-wrapper">
          <!-- Person outline icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M4 20c0-3.9 3.6-7 8-7s8 3.1 8 7"/>
          </svg>
          <input
            type="text"
            id="reg-name"
            name="name"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="reg-email">Email address</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          <input
            type="email"
            id="reg-email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="15" r="4"/>
            <line x1="11.5" y1="11.5" x2="20" y2="3"/>
            <line x1="17" y1="6" x2="19" y2="8"/>
          </svg>
          <input
            type="password"
            id="reg-password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirm password</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <input
            type="password"
            id="reg-confirm"
            name="confirm_password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-register">Create account</button>
    </form>

    <div class="divider">or</div>

    <p class="login-text">
      Already have an account? <a href="#">Sign in</a>
    </p>
  </div>
</body>
</html>
