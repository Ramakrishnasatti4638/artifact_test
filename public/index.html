<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 URL Shortener</h1>
            <p>Create short, memorable links in seconds</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalLinks">0</div>
                <div class="stat-label">Total Links</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
        </div>

        <div class="shorten-form-card">
            <h2>Shorten a URL</h2>
            <form id="shortenForm">
                <div class="form-group">
                    <label for="urlInput">Enter URL</label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://example.com/very/long/url" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="customAlias">Custom Alias (optional)</label>
                    <input 
                        type="text" 
                        id="customAlias" 
                        placeholder="my-custom-link"
                        pattern="[a-zA-Z0-9\-_]+"
                        title="Only letters, numbers, hyphens, and underscores allowed"
                    >
                </div>
                <button type="submit" class="btn btn-primary">Shorten URL</button>
            </form>

            <div id="result" class="result hidden">
                <div class="result-label">Your shortened URL:</div>
                <div class="result-url-container">
                    <a id="shortUrlLink" href="" target="_blank"></a>
                    <button id="copyBtn" class="btn btn-secondary">Copy</button>
                </div>
            </div>

            <div id="error" class="error hidden"></div>
        </div>

        <div class="links-section">
            <h2>All Shortened Links</h2>
            <div class="table-container">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short URL</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr class="empty-state">
                            <td colspan="5">No links created yet. Start by shortening your first URL!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
