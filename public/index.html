<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Transform long URLs into short, shareable links</p>
    </header>

    <!-- Stats Summary -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <!-- Shorten Form -->
    <div class="shorten-form">
      <div class="form-group">
        <label for="urlInput">Enter URL to shorten</label>
        <input 
          type="text" 
          id="urlInput" 
          placeholder="https://example.com/very-long-url"
          autocomplete="off"
        >
      </div>
      
      <div class="form-group">
        <label for="customAlias">Custom alias (optional)</label>
        <input 
          type="text" 
          id="customAlias" 
          placeholder="my-custom-link"
          autocomplete="off"
        >
      </div>

      <button id="shortenBtn" class="btn-primary">Shorten URL</button>

      <div id="result" class="result" style="display: none;">
        <div class="result-label">Your shortened URL:</div>
        <div class="result-url-container">
          <a id="shortUrl" href="" target="_blank"></a>
          <button id="copyBtn" class="btn-copy">Copy</button>
        </div>
      </div>

      <div id="error" class="error" style="display: none;"></div>
    </div>

    <!-- Links Table -->
    <div class="links-section">
      <h2>All Shortened Links</h2>
      <div class="table-container">
        <table id="linksTable">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr class="empty-state">
              <td colspan="5">No links yet. Create your first shortened link above!</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
