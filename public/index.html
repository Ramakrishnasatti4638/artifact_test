<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #293548;
      --border:    #334155;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --danger:    #ef4444;
      --danger-h:  #f87171;
      --success:   #22c55e;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Shorten form ── */
    .shorten-card { max-width: 680px; margin: 0 auto 1.5rem; }

    .input-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .input-row input {
      flex: 1 1 240px;
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    .btn {
      padding: 0.7rem 1.3rem;
      border-radius: var(--radius);
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-copy   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 0.35rem 0.75rem; font-size: 0.8rem; }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Result box ── */
    #result-box {
      display: none;
      margin-top: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    #result-box.visible { display: flex; }
    #result-box .label { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
    #result-link {
      flex: 1 1 180px;
      color: var(--accent-h);
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
    }
    #result-link:hover { text-decoration: underline; }
    #copy-feedback {
      font-size: 0.8rem;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* ── Error msg ── */
    #error-msg {
      color: var(--danger);
      font-size: 0.87rem;
      margin-top: 0.6rem;
      min-height: 1.2em;
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 1rem;
      max-width: 680px;
      margin: 0 auto 1.5rem;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1 1 140px;
      text-align: center;
      padding: 1rem;
    }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .stat-label { color: var(--muted); font-size: 0.82rem; margin-top: 0.25rem; }

    /* ── Links table ── */
    .table-wrap { max-width: 900px; margin: 0 auto; overflow-x: auto; }
    .table-wrap h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead th {
      text-align: left;
      padding: 0.65rem 0.85rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .orig-url {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .short-url-cell { white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; }
    .short-url-cell a { color: var(--accent-h); text-decoration: none; font-weight: 600; }
    .short-url-cell a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.1rem 0.6rem;
      font-size: 0.78rem;
      color: var(--text);
    }
    .badge.hot { border-color: var(--accent); color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }
    .empty-state svg { opacity: 0.25; margin-bottom: 0.75rem; }

    /* ── Spinner overlay (loading) ── */
    #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; align-items: center; justify-content: center; }
    #loading.on { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<header>
  <h1>URL <span>Shortener</span></h1>
  <p>Shorten any link, track clicks in real-time.</p>
</header>

<!-- ── Shorten form ── -->
<div class="card shorten-card">
  <div class="input-row">
    <input id="url-input"   type="url"  placeholder="https://example.com/very/long/url" autocomplete="off" />
    <input id="alias-input" type="text" placeholder="Custom alias (optional)"            autocomplete="off" style="max-width:220px" />
    <button class="btn btn-primary" id="shorten-btn">Shorten</button>
  </div>
  <div id="error-msg"></div>

  <!-- Result -->
  <div id="result-box">
    <span class="label">Short URL:</span>
    <a id="result-link" href="#" target="_blank" rel="noopener"></a>
    <button class="btn btn-copy" id="copy-btn">Copy</button>
    <span id="copy-feedback">Copied!</span>
  </div>
</div>

<!-- ── Stats summary ── -->
<div class="stats-row">
  <div class="card stat-card">
    <div class="stat-value" id="stat-total">0</div>
    <div class="stat-label">Total Links</div>
  </div>
  <div class="card stat-card">
    <div class="stat-value" id="stat-clicks">0</div>
    <div class="stat-label">Total Clicks</div>
  </div>
</div>

<!-- ── Links table ── -->
<div class="card table-wrap">
  <h2>All Links</h2>
  <table id="links-table">
    <thead>
      <tr>
        <th>Original URL</th>
        <th>Short URL</th>
        <th>Clicks</th>
        <th>Created</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="links-body">
      <tr><td colspan="5"><div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <p>No links yet. Shorten your first URL above!</p>
      </div></td></tr>
    </tbody>
  </table>
</div>

<script>
  const BASE = window.location.origin;

  const urlInput    = document.getElementById('url-input');
  const aliasInput  = document.getElementById('alias-input');
  const shortenBtn  = document.getElementById('shorten-btn');
  const errorMsg    = document.getElementById('error-msg');
  const resultBox   = document.getElementById('result-box');
  const resultLink  = document.getElementById('result-link');
  const copyBtn     = document.getElementById('copy-btn');
  const copyFeedback= document.getElementById('copy-feedback');
  const linksBody   = document.getElementById('links-body');
  const statTotal   = document.getElementById('stat-total');
  const statClicks  = document.getElementById('stat-clicks');
  const loading     = document.getElementById('loading');

  // ── Helpers ──────────────────────────────────────────────────────────────

  function setLoading(on) { loading.classList.toggle('on', on); }

  function showError(msg) { errorMsg.textContent = msg; }
  function clearError()   { errorMsg.textContent = ''; }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function truncate(str, n = 50) {
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  // ── API ───────────────────────────────────────────────────────────────────

  async function fetchLinks() {
    const res = await fetch('/api/links');
    return res.json();
  }

  async function shortenUrl(url, customAlias) {
    const body = { url };
    if (customAlias) body.customAlias = customAlias;
    const res = await fetch('/api/shorten', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  }

  async function deleteLink(shortCode) {
    return fetch(`/api/links/${shortCode}`, { method: 'DELETE' });
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderLinks(links) {
    const totalClicks = links.reduce((s, l) => s + l.clickCount, 0);
    statTotal.textContent  = links.length;
    statClicks.textContent = totalClicks;

    if (!links.length) {
      linksBody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <p>No links yet. Shorten your first URL above!</p>
      </div></td></tr>`;
      return;
    }

    linksBody.innerHTML = links.map(link => {
      const shortUrl   = `${BASE}/${link.shortCode}`;
      const isHot      = link.clickCount > 0;
      return `<tr>
        <td><span class="orig-url" title="${link.originalUrl}">${truncate(link.originalUrl)}</span></td>
        <td>
          <div class="short-url-cell">
            <a href="${shortUrl}" target="_blank" rel="noopener">${link.shortCode}</a>
            <button class="btn btn-copy" data-copy="${shortUrl}">Copy</button>
          </div>
        </td>
        <td><span class="badge ${isHot ? 'hot' : ''}">${link.clickCount}</span></td>
        <td>${formatDate(link.createdAt)}</td>
        <td><button class="btn btn-danger" data-delete="${link.shortCode}">Delete</button></td>
      </tr>`;
    }).join('');
  }

  async function refreshLinks() {
    const links = await fetchLinks();
    renderLinks(links);
  }

  // ── Event: shorten ────────────────────────────────────────────────────────

  async function handleShorten() {
    clearError();
    resultBox.classList.remove('visible');

    const url   = urlInput.value.trim();
    const alias = aliasInput.value.trim();

    if (!url) { showError('Please enter a URL.'); return; }

    setLoading(true);
    const { ok, data } = await shortenUrl(url, alias);
    setLoading(false);

    if (!ok) {
      showError(data.error || 'Something went wrong.');
      return;
    }

    const shortUrl = `${BASE}/${data.shortCode}`;
    resultLink.href        = shortUrl;
    resultLink.textContent = shortUrl;
    resultBox.classList.add('visible');

    urlInput.value  = '';
    aliasInput.value = '';

    await refreshLinks();
  }

  shortenBtn.addEventListener('click', handleShorten);
  urlInput.addEventListener('keydown', e => e.key === 'Enter' && handleShorten());

  // ── Event: copy (result box) ──────────────────────────────────────────────

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(resultLink.href);
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = resultLink.href;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    copyFeedback.style.opacity = '1';
    setTimeout(() => { copyFeedback.style.opacity = '0'; }, 1500);
  });

  // ── Event: table actions (delete / copy) ──────────────────────────────────

  linksBody.addEventListener('click', async e => {
    const delBtn  = e.target.closest('[data-delete]');
    const copyBtnEl = e.target.closest('[data-copy]');

    if (delBtn) {
      const code = delBtn.dataset.delete;
      if (!confirm(`Delete short link "${code}"?`)) return;
      setLoading(true);
      await deleteLink(code);
      setLoading(false);
      await refreshLinks();
    }

    if (copyBtnEl) {
      try {
        await navigator.clipboard.writeText(copyBtnEl.dataset.copy);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = copyBtnEl.dataset.copy;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const orig = copyBtnEl.textContent;
      copyBtnEl.textContent = 'Copied!';
      setTimeout(() => { copyBtnEl.textContent = orig; }, 1200);
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  refreshLinks();
</script>
</body>
</html>
