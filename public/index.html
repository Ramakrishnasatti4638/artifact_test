<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="header-text">
          <h1>🔗 URL Shortener</h1>
          <p>Shorten your long URLs with ease</p>
        </div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <div class="shorten-form">
      <input 
        type="text" 
        id="urlInput" 
        placeholder="Enter your long URL here..." 
        aria-label="URL to shorten"
      >
      <input 
        type="text" 
        id="customAlias" 
        placeholder="Custom alias (optional)" 
        aria-label="Custom alias"
      >
      <button id="shortenBtn">Shorten URL</button>
    </div>

    <div id="result" class="result hidden">
      <div class="result-content">
        <label>Your shortened URL:</label>
        <div class="short-url-container">
          <a id="shortUrl" href="#" target="_blank"></a>
          <button id="copyBtn" title="Copy to clipboard">📋 Copy</button>
        </div>
      </div>
    </div>

    <div class="links-section">
      <h2>Your Links</h2>
      <div id="linksTableContainer">
        <table id="linksTable">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr>
              <td colspan="5" class="no-data">No links yet. Create your first short URL!</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
