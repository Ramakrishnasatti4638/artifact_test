<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>

    <div class="card form-card">
      <input type="text" id="urlInput" placeholder="Enter a URL (e.g. https://example.com)" />
      <input type="text" id="customAliasInput" placeholder="Custom alias (optional)" />
      <button id="shortenBtn">Shorten</button>

      <div id="result" class="result hidden">
        <p>Short URL:</p>
        <a id="shortLink" href="#" target="_blank"></a>
        <button id="copyBtn">Copy</button>
      </div>
      <p id="error" class="error hidden"></p>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card">
        <h3>Total Links</h3>
        <p id="totalLinks">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Clicks</h3>
        <p id="totalClicks">0</p>
      </div>
    </div>

    <table id="linksTable">
      <thead>
        <tr>
          <th>Original URL</th>
          <th>Short URL</th>
          <th>Clicks</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/app.js"></script>
</body>
</html>
