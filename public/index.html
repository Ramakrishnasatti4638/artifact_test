<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 URL Shortener</h1>
            <p>Shorten your long URLs instantly</p>
        </header>

        <!-- Stats Summary -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalLinks">0</div>
                <div class="stat-label">Total Links</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
        </div>

        <!-- Shorten Form -->
        <div class="card">
            <h2>Create Short Link</h2>
            <form id="shortenForm">
                <div class="form-group">
                    <label for="urlInput">Original URL</label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://example.com/very-long-url" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="aliasInput">Custom Alias (optional)</label>
                    <input 
                        type="text" 
                        id="aliasInput" 
                        placeholder="my-custom-link" 
                        pattern="[a-zA-Z0-9-_]+"
                        title="Only letters, numbers, hyphens, and underscores"
                    >
                </div>
                <button type="submit" class="btn btn-primary">Shorten URL</button>
            </form>

            <!-- Result Display -->
            <div id="resultContainer" class="result-container" style="display: none;">
                <h3>✅ Short URL Created!</h3>
                <div class="short-url-display">
                    <a id="shortUrlLink" href="#" target="_blank"></a>
                    <button id="copyBtn" class="btn btn-copy">Copy</button>
                </div>
            </div>

            <!-- Error Display -->
            <div id="errorContainer" class="error-container" style="display: none;">
                <p id="errorMessage"></p>
            </div>
        </div>

        <!-- Links Table -->
        <div class="card">
            <h2>All Links</h2>
            <div class="table-container">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short URL</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr>
                            <td colspan="5" class="no-data">No links yet. Create your first short link above!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
