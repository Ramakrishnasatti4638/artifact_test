<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>Shorten your URLs and track clicks</p>
    </header>

    <!-- Stats Summary -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalLinks">0</div>
        <div class="stat-label">Total Links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalClicks">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
    </div>

    <!-- URL Shortener Form -->
    <div class="card">
      <h2>Create Short Link</h2>
      <div class="form-group">
        <label for="urlInput">Original URL</label>
        <input 
          type="text" 
          id="urlInput" 
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
        >
      </div>
      <div class="form-group">
        <label for="customAlias">Custom Alias (Optional)</label>
        <input 
          type="text" 
          id="customAlias" 
          placeholder="my-custom-link"
          autocomplete="off"
        >
      </div>
      <button id="shortenBtn" class="btn btn-primary">Shorten URL</button>
      <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Result Display -->
    <div id="resultCard" class="card result-card" style="display: none;">
      <h3>✅ Short URL Created!</h3>
      <div class="short-url-container">
        <input 
          type="text" 
          id="shortUrlDisplay" 
          readonly 
          class="short-url-input"
        >
        <button id="copyBtn" class="btn btn-secondary">Copy</button>
      </div>
      <a id="shortUrlLink" href="#" target="_blank" class="short-link">Visit Short URL →</a>
    </div>

    <!-- Links Table -->
    <div class="card">
      <h2>All Shortened Links</h2>
      <div class="table-container">
        <table id="linksTable">
          <thead>
            <tr>
              <th>Original URL</th>
              <th>Short URL</th>
              <th>Clicks</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr>
              <td colspan="5" class="no-data">No links created yet</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
